<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visualizador</title>

  <!-- Aparência de app no iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Visualizador">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .inicio {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input,
    textarea,
    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    textarea {
      height: 220px;
      font-family: monospace;
      resize: none;
    }

    button {
      background: #007aff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .preview {
      display: none;
      width: 100vw;
      height: 100vh;
      background: white;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .voltar {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 9999;
      width: auto;
      padding: 10px 14px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <section class="inicio" id="inicio">
    <h1>Carregar código ou colar</h1>

    <input type="file" id="arquivo" accept=".html,.htm,.txt">

    <textarea id="codigo" placeholder="Cole aqui o código HTML do site..."></textarea>

    <button onclick="enviar()">Enviar</button>
  </section>

  <section class="preview" id="previewArea">
    <button class="voltar" onclick="voltar()">Voltar</button>
    <iframe id="preview"></iframe>
  </section>

  <script>
    const arquivo = document.getElementById("arquivo");
    const codigo = document.getElementById("codigo");
    const inicio = document.getElementById("inicio");
    const previewArea = document.getElementById("previewArea");
    const preview = document.getElementById("preview");

    arquivo.addEventListener("change", function () {
      const file = arquivo.files[0];
      if (!file) return;

      const leitor = new FileReader();

      leitor.onload = function (e) {
        codigo.value = e.target.result;
      };

      leitor.readAsText(file);
    });

    function enviar() {
      if (codigo.value.trim() === "") {
        alert("Carregue um arquivo ou cole um código.");
        return;
      }

      preview.srcdoc = codigo.value;

      inicio.style.display = "none";
      previewArea.style.display = "block";
    }

    function voltar() {
      previewArea.style.display = "none";
      inicio.style.display = "flex";
    }
  </script>

</body>
</html>
