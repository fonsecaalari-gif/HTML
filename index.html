<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
    }

    textarea {
      width: 100%;
      height: 220px;
      margin-top: 10px;
      font-family: monospace;
      padding: 10px;
    }

    iframe {
      display: block;
      background: white;
      border: 2px solid #333;
      margin: 20px auto;
    }
  </style>
</head>
<body>

  <h1>Visualizador de Site</h1>

  <input type="file" id="arquivo" accept=".html,.htm,.txt">

  <select id="tela">
    <option value="desktop">Desktop</option>
    <option value="tablet">Tablet</option>
    <option value="celular">Celular</option>
  </select>

  <textarea id="codigo" placeholder="Cole aqui o código HTML do site..."></textarea>

  <button onclick="visualizar()">Visualizar</button>

  <iframe id="preview"></iframe>

  <script>
    const arquivo = document.getElementById("arquivo");
    const tela = document.getElementById("tela");
    const codigo = document.getElementById("codigo");
    const preview = document.getElementById("preview");

    const tamanhos = {
      desktop: { largura: "1200px", altura: "700px" },
      tablet: { largura: "768px", altura: "900px" },
      celular: { largura: "390px", altura: "844px" }
    };

    function aplicarTamanho() {
      const tamanho = tamanhos[tela.value];
      preview.style.width = tamanho.largura;
      preview.style.height = tamanho.altura;
    }

    function visualizar() {
      preview.srcdoc = codigo.value;
      aplicarTamanho();
    }

    arquivo.addEventListener("change", function () {
      const file = arquivo.files[0];
      if (!file) return;

      const leitor = new FileReader();

      leitor.onload = function (e) {
        codigo.value = e.target.result;
        visualizar();
      };

      leitor.readAsText(file);
    });

    tela.addEventListener("change", aplicarTamanho);

    aplicarTamanho();
  </script>

</body>
</html>
